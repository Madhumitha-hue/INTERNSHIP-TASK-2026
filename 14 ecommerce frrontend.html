<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEase - Ecommerce Store</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f7fa;
}

/* Header */
header{
    background:#fff;
    padding:15px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    position:sticky;
    top:0;
    z-index:100;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#2563eb;
}

nav ul{
    display:flex;
    list-style:none;
    gap:25px;
}

nav a{
    text-decoration:none;
    color:#333;
    font-weight:600;
}

.search-box input{
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
}

.cart-btn{
    background:#2563eb;
    color:#fff;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
}

/* Hero */
.hero{
    height:70vh;
    background:linear-gradient(rgba(0,0,0,.5),
    rgba(0,0,0,.5)),
    url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1600');
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:#fff;
}

.hero h1{
    font-size:50px;
    margin-bottom:15px;
}

.hero p{
    font-size:20px;
    margin-bottom:20px;
}

.hero button{
    background:#2563eb;
    color:white;
    border:none;
    padding:14px 30px;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

/* Products */
.products{
    padding:60px 8%;
}

.section-title{
    text-align:center;
    margin-bottom:40px;
}

.section-title h2{
    font-size:36px;
}

.product-grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.product-card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    transition:.3s;
}

.product-card:hover{
    transform:translateY(-8px);
}

.product-card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.product-info{
    padding:20px;
}

.product-info h3{
    margin-bottom:10px;
}

.price{
    color:#2563eb;
    font-size:22px;
    font-weight:bold;
    margin:10px 0;
}

.rating{
    color:orange;
    margin-bottom:15px;
}

.product-btn{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* Footer */
footer{
    background:#111827;
    color:white;
    text-align:center;
    padding:25px;
    margin-top:50px;
}

/* Responsive */
@media(max-width:768px){

header{
    flex-wrap:wrap;
    gap:15px;
}

nav ul{
    flex-wrap:wrap;
    justify-content:center;
}

.hero h1{
    font-size:34px;
}

.hero p{
    font-size:16px;
}
}
</style>
</head>
<body>

<header>
    <div class="logo">ShopEase</div>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Products</a></li>
            <li><a href="#">Categories</a></li>
            <li><a href="#">Offers</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <div class="search-box">
        <input type="text" placeholder="Search products">
    </div>

    <button class="cart-btn">
        Cart (<span id="cartCount">0</span>)
    </button>
</header>

<section class="hero">
    <div>
        <h1>Discover Amazing Products</h1>
        <p>Shop the latest collections at unbeatable prices.</p>
        <button>Shop Now</button>
    </div>
</section>

<section class="products">

    <div class="section-title">
        <h2>Featured Products</h2>
    </div>

    <div class="product-grid" id="productGrid"></div>

</section>

<footer>
    <p>© 2026 ShopEase. All Rights Reserved.</p>
</footer>

<script>

const products = [
{
    name:"Wireless Headphones",
    price:89,
    image:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600"
},
{
    name:"Smart Watch",
    price:149,
    image:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600"
},
{
    name:"Running Shoes",
    price:79,
    image:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600"
},
{
    name:"Laptop",
    price:899,
    image:"https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=600"
},
{
    name:"Camera",
    price:499,
    image:"https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=600"
},
{
    name:"Bluetooth Speaker",
    price:69,
    image:"https://images.unsplash.com/photo-1589003077984-894e133dabab?w=600"
}
];

const grid = document.getElementById("productGrid");
let cart = 0;

products.forEach(product => {

grid.innerHTML += `
<div class="product-card">
    <img src="${product.image}" alt="">
    <div class="product-info">
        <h3>${product.name}</h3>
        <div class="rating">★★★★★</div>
        <div class="price">$${product.price}</div>
        <button class="product-btn"
        onclick="addToCart()">
            Add To Cart
        </button>
    </div>
</div>
`;

});

function addToCart(){
    cart++;
    document.getElementById("cartCount")
    .innerText = cart;
}

</script>

</body>
</html>
