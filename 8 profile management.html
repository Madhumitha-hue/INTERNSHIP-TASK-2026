<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Management</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#4f46e5,#06b6d4);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.profile-container{
    width:100%;
    max-width:900px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:30px;
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
    color:white;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    font-size:2rem;
}

.profile-top{
    display:flex;
    flex-wrap:wrap;
    gap:30px;
    align-items:center;
    margin-bottom:30px;
}

.avatar-section{
    flex:1;
    min-width:250px;
    text-align:center;
}

.avatar{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid white;
    margin-bottom:15px;
}

.upload-btn{
    background:white;
    color:#4f46e5;
    padding:10px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}

.profile-info{
    flex:2;
    min-width:300px;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.input-group{
    display:flex;
    flex-direction:column;
}

.input-group label{
    margin-bottom:6px;
    font-weight:600;
}

.input-group input,
.input-group textarea{
    padding:12px;
    border:none;
    border-radius:10px;
    outline:none;
    background:rgba(255,255,255,0.9);
}

textarea{
    resize:none;
    height:100px;
}

.actions{
    text-align:center;
    margin-top:25px;
}

.btn{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    font-weight:600;
    margin:5px;
}

.edit-btn{
    background:#f59e0b;
    color:white;
}

.save-btn{
    background:#10b981;
    color:white;
}

@media(max-width:768px){
    .profile-top{
        flex-direction:column;
    }
}
</style>
</head>
<body>

<div class="profile-container">

    <div class="header">
        <h1>Profile Management</h1>
        <p>Manage your account information</p>
    </div>

    <div class="profile-top">

        <div class="avatar-section">
            <img src="https://via.placeholder.com/150"
                 id="profileImage"
                 class="avatar">

            <br>

            <input type="file" id="imageUpload" hidden>
            <button class="upload-btn"
                onclick="document.getElementById('imageUpload').click()">
                Upload Photo
            </button>
        </div>

        <div class="profile-info">
            <div class="form-grid">

                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" value="John Doe">
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" value="john@example.com">
                </div>

                <div class="input-group">
                    <label>Phone</label>
                    <input type="tel" value="+91 9876543210">
                </div>

                <div class="input-group">
                    <label>Location</label>
                    <input type="text" value="Tamil Nadu, India">
                </div>

            </div>
        </div>

    </div>

    <div class="input-group">
        <label>Bio</label>
        <textarea>
Passionate UI/UX Designer and Front-End Developer.
        </textarea>
    </div>

    <div class="actions">
        <button class="btn edit-btn">Edit Profile</button>
        <button class="btn save-btn" onclick="saveProfile()">
            Save Changes
        </button>
    </div>

</div>

<script>
const imageUpload = document.getElementById('imageUpload');
const profileImage = document.getElementById('profileImage');

imageUpload.addEventListener('change', function() {
    const file = this.files[0];

    if(file){
        const reader = new FileReader();

        reader.onload = function(e){
            profileImage.src = e.target.result;
        }

        reader.readAsDataURL(file);
    }
});

function saveProfile(){
    alert("Profile updated successfully!");
}
</script>

</body>
</html>
