<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login & Signup</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,.2);
}

.tab-container{
    display:flex;
}

.tab{
    flex:1;
    padding:18px;
    text-align:center;
    cursor:pointer;
    font-weight:600;
    background:#f3f4f6;
    transition:.3s;
}

#login:checked ~ .tab-container .login-tab,
#signup:checked ~ .tab-container .signup-tab{
    background:#4f46e5;
    color:#fff;
}

input[type="radio"]{
    display:none;
}

.forms{
    position:relative;
    width:200%;
    display:flex;
    transition:.5s;
}

.form-box{
    width:50%;
    padding:35px;
}

#signup:checked ~ .forms{
    transform:translateX(-50%);
}

.form-box h2{
    text-align:center;
    margin-bottom:25px;
    color:#111827;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:6px;
    color:#4b5563;
    font-size:14px;
}

.input-group input{
    width:100%;
    padding:14px;
    border:1px solid #d1d5db;
    border-radius:10px;
    outline:none;
    transition:.3s;
}

.input-group input:focus{
    border-color:#4f46e5;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#4f46e5;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    background:#4338ca;
}

.extra{
    text-align:center;
    margin-top:15px;
    font-size:14px;
    color:#6b7280;
}

.extra a{
    color:#4f46e5;
    text-decoration:none;
    font-weight:600;
}

.social-login{
    margin-top:20px;
    display:flex;
    gap:10px;
}

.social-btn{
    flex:1;
    padding:12px;
    border:1px solid #d1d5db;
    border-radius:10px;
    background:white;
    cursor:pointer;
    font-weight:600;
}

@media(max-width:480px){
    .form-box{
        padding:25px;
    }
}
</style>
</head>
<body>

<div class="container">

    <input type="radio" name="tab" id="login" checked>
    <input type="radio" name="tab" id="signup">

    <div class="tab-container">
        <label for="login" class="tab login-tab">Login</label>
        <label for="signup" class="tab signup-tab">Sign Up</label>
    </div>

    <div class="forms">

        <!-- Login Form -->
        <div class="form-box">
            <h2>Welcome Back</h2>

            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="Enter your email">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Enter your password">
            </div>

            <button class="btn">Login</button>

            <div class="extra">
                <a href="#">Forgot Password?</a>
            </div>

            <div class="social-login">
                <button class="social-btn">Google</button>
                <button class="social-btn">GitHub</button>
            </div>
        </div>

        <!-- Signup Form -->
        <div class="form-box">
            <h2>Create Account</h2>

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your name">
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="Enter your email">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Create password">
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="Confirm password">
            </div>

            <button class="btn">Create Account</button>

            <div class="social-login">
                <button class="social-btn">Google</button>
                <button class="social-btn">GitHub</button>
            </div>
        </div>

    </div>

</div>

</body>
</html>
