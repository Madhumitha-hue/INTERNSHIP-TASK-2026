<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Responsive Navbar</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
}

/* Navbar */
.navbar{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    max-width:1300px;
    padding:15px 40px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:18px;

    box-shadow:
    0 8px 32px rgba(0,0,0,0.25);

    z-index:1000;
}

/* Logo */
.logo{
    font-size:1.8rem;
    font-weight:700;
    text-decoration:none;
    color:#fff;
}

.logo span{
    background:linear-gradient(45deg,#06b6d4,#8b5cf6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* Menu */
.nav-links{
    display:flex;
    list-style:none;
    gap:35px;
}

.nav-links a{
    text-decoration:none;
    color:#fff;
    font-size:15px;
    font-weight:500;
    position:relative;
    transition:.3s;
}

.nav-links a::after{
    content:'';
    position:absolute;
    width:0;
    height:2px;
    left:0;
    bottom:-5px;
    background:linear-gradient(90deg,#06b6d4,#8b5cf6);
    transition:.4s;
}

.nav-links a:hover::after{
    width:100%;
}

.nav-links a:hover{
    color:#38bdf8;
}

/* CTA Button */
.nav-btn{
    padding:12px 24px;
    border:none;
    border-radius:50px;
    text-decoration:none;
    color:#fff;
    font-weight:600;
    background:linear-gradient(45deg,#06b6d4,#8b5cf6);
    transition:.4s;
    box-shadow:0 8px 25px rgba(139,92,246,.35);
}

.nav-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 35px rgba(139,92,246,.5);
}

/* Hamburger */
.menu-toggle{
    display:none;
    flex-direction:column;
    cursor:pointer;
}

.menu-toggle span{
    width:28px;
    height:3px;
    background:white;
    margin:4px 0;
    border-radius:5px;
    transition:.4s;
}

/* Mobile */
@media(max-width:900px){

    .menu-toggle{
        display:flex;
    }

    .nav-btn{
        display:none;
    }

    .nav-links{
        position:absolute;
        top:90px;
        left:0;
        width:100%;
        flex-direction:column;
        text-align:center;
        gap:25px;

        background:rgba(15,23,42,.95);
        backdrop-filter:blur(20px);

        border-radius:18px;
        overflow:hidden;

        max-height:0;
        transition:max-height .5s ease;
    }

    .nav-links.active{
        max-height:400px;
        padding:30px 0;
    }
}
</style>
</head>

<body>

<nav class="navbar">

    <a href="#" class="logo">
        Nova<span>Tech</span>
    </a>

    <ul class="nav-links" id="navLinks">
        <li><a href="#">Home</a></li>
        <li><a href="#">Features</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Pricing</a></li>
        <li><a href="#">Contact</a></li>
    </ul>

    <a href="#" class="nav-btn">Get Started</a>

    <div class="menu-toggle" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
    </div>

</nav>

<script>
const menuToggle = document.getElementById("menuToggle");
const navLinks = document.getElementById("navLinks");

menuToggle.addEventListener("click", () => {
    navLinks.classList.toggle("active");
});
</script>

</body>
</html>
