<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    margin-bottom:20px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.product{
    background:#fff;
    padding:20px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.product img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:8px;
}

.product h3{
    margin:10px 0;
}

.product button{
    background:#2563eb;
    color:#fff;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

.cart{
    margin-top:40px;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.cart-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 0;
    border-bottom:1px solid #eee;
}

.item-info{
    flex:1;
}

.quantity{
    display:flex;
    align-items:center;
    gap:10px;
}

.quantity button{
    width:30px;
    height:30px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

.remove-btn{
    background:#dc2626;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:5px;
    cursor:pointer;
}

.total{
    margin-top:20px;
    text-align:right;
    font-size:22px;
    font-weight:bold;
}

.cart-count{
    background:#2563eb;
    color:white;
    padding:10px 15px;
    border-radius:6px;
    display:inline-block;
    margin-bottom:20px;
}

.empty{
    text-align:center;
    color:#777;
    padding:20px;
}
</style>
</head>
<body>

<div class="container">

    <div class="cart-count">
        Cart Items: <span id="cartCount">0</span>
    </div>

    <h1>Products</h1>

    <div class="products">

        <div class="product">
            <img src="https://via.placeholder.com/300x200" alt="">
            <h3>Wireless Headphones</h3>
            <p>$89</p>
            <button onclick="addToCart(1,'Wireless Headphones',89)">
                Add To Cart
            </button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/300x200" alt="">
            <h3>Smart Watch</h3>
            <p>$149</p>
            <button onclick="addToCart(2,'Smart Watch',149)">
                Add To Cart
            </button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/300x200" alt="">
            <h3>Running Shoes</h3>
            <p>$79</p>
            <button onclick="addToCart(3,'Running Shoes',79)">
                Add To Cart
            </button>
        </div>

    </div>

    <div class="cart">
        <h2>Shopping Cart</h2>

        <div id="cartItems">
            <div class="empty">
                Your cart is empty
            </div>
        </div>

        <div class="total">
            Total: $<span id="totalPrice">0</span>
        </div>
    </div>

</div>

<script>

let cart = [];

function addToCart(id,name,price){

    const existing = cart.find(item => item.id === id);

    if(existing){
        existing.qty++;
    }else{
        cart.push({
            id,
            name,
            price,
            qty:1
        });
    }

    renderCart();
}

function increaseQty(id){
    const item = cart.find(p => p.id === id);
    item.qty++;
    renderCart();
}

function decreaseQty(id){

    const item = cart.find(p => p.id === id);

    if(item.qty > 1){
        item.qty--;
    }else{
        removeItem(id);
        return;
    }

    renderCart();
}

function removeItem(id){
    cart = cart.filter(item => item.id !== id);
    renderCart();
}

function renderCart(){

    const cartItems =
    document.getElementById("cartItems");

    const cartCount =
    document.getElementById("cartCount");

    const totalPrice =
    document.getElementById("totalPrice");

    cartItems.innerHTML = "";

    let total = 0;
    let count = 0;

    if(cart.length === 0){
        cartItems.innerHTML =
        `<div class="empty">
            Your cart is empty
        </div>`;
    }

    cart.forEach(item => {

        total += item.price * item.qty;
        count += item.qty;

        cartItems.innerHTML += `
        <div class="cart-item">

            <div class="item-info">
                <h4>${item.name}</h4>
                <p>$${item.price}</p>
            </div>

            <div class="quantity">
                <button onclick="decreaseQty(${item.id})">-</button>
                <span>${item.qty}</span>
                <button onclick="increaseQty(${item.id})">+</button>
            </div>

            <h4>
                $${item.price * item.qty}
            </h4>

            <button class="remove-btn"
                onclick="removeItem(${item.id})">
                Remove
            </button>

        </div>
        `;
    });

    cartCount.textContent = count;
    totalPrice.textContent = total.toFixed(2);
}

</script>

</body>
</html>
