<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f6f9;
    padding:30px;
}

.checkout-container{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:30px;
}

.card{
    background:#fff;
    border-radius:15px;
    padding:25px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
}

h2{
    margin-bottom:20px;
    color:#333;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group.full{
    grid-column:1/-1;
}

label{
    margin-bottom:8px;
    font-weight:600;
}

input,
select,
textarea{
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    outline:none;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#2563eb;
}

textarea{
    resize:none;
    min-height:100px;
}

.order-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
    padding-bottom:10px;
    border-bottom:1px solid #eee;
}

.summary-row{
    display:flex;
    justify-content:space-between;
    margin:12px 0;
}

.total{
    font-size:22px;
    font-weight:bold;
    color:#2563eb;
}

.place-order{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    background:#2563eb;
    color:#fff;
    font-size:16px;
    font-weight:bold;
    border-radius:8px;
    cursor:pointer;
}

.place-order:hover{
    background:#1d4ed8;
}

.success-message{
    display:none;
    margin-top:15px;
    padding:12px;
    background:#dcfce7;
    color:#166534;
    border-radius:8px;
}

@media(max-width:768px){

.checkout-container{
    grid-template-columns:1fr;
}

.form-grid{
    grid-template-columns:1fr;
}

}
</style>
</head>
<body>

<div class="checkout-container">

    <!-- Billing Details -->
    <div class="card">

        <h2>Billing Information</h2>

        <form id="checkoutForm">

            <div class="form-grid">

                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" required>
                </div>

                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" required>
                </div>

                <div class="form-group full">
                    <label>Email Address</label>
                    <input type="email" required>
                </div>

                <div class="form-group full">
                    <label>Phone Number</label>
                    <input type="tel" required>
                </div>

                <div class="form-group full">
                    <label>Street Address</label>
                    <input type="text" required>
                </div>

                <div class="form-group">
                    <label>City</label>
                    <input type="text" required>
                </div>

                <div class="form-group">
                    <label>Postal Code</label>
                    <input type="text" required>
                </div>

                <div class="form-group full">
                    <label>Country</label>
                    <select required>
                        <option value="">Select Country</option>
                        <option>India</option>
                        <option>United States</option>
                        <option>United Kingdom</option>
                    </select>
                </div>

                <div class="form-group full">
                    <label>Order Notes</label>
                    <textarea placeholder="Optional notes..."></textarea>
                </div>

                <div class="form-group full">
                    <label>Payment Method</label>
                    <select required>
                        <option value="">Select Payment Method</option>
                        <option>Credit Card</option>
                        <option>Debit Card</option>
                        <option>UPI</option>
                        <option>Cash On Delivery</option>
                    </select>
                </div>

            </div>

        </form>

    </div>

    <!-- Order Summary -->
    <div class="card">

        <h2>Order Summary</h2>

        <div class="order-item">
            <span>Wireless Headphones × 1</span>
            <span>$89</span>
        </div>

        <div class="order-item">
            <span>Smart Watch × 1</span>
            <span>$149</span>
        </div>

        <div class="summary-row">
            <span>Subtotal</span>
            <span>$238</span>
        </div>

        <div class="summary-row">
            <span>Shipping</span>
            <span>$10</span>
        </div>

        <div class="summary-row">
            <span>Tax</span>
            <span>$12</span>
        </div>

        <hr style="margin:15px 0;">

        <div class="summary-row total">
            <span>Total</span>
            <span>$260</span>
        </div>

        <button
            class="place-order"
            onclick="placeOrder()">
            Place Order
        </button>

        <div class="success-message" id="successMsg">
            🎉 Order placed successfully!
        </div>

    </div>

</div>

<script>
function placeOrder() {

    const form =
    document.getElementById("checkoutForm");

    if(form.checkValidity()){

        document
        .getElementById("successMsg")
        .style.display = "block";

        setTimeout(() => {
            alert("Thank you for your purchase!");
        }, 500);

    } else {
        form.reportValidity();
    }
}
</script>

</body>
</html>
