<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.form-container{
    background:#fff;
    width:100%;
    max-width:700px;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.form-container h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group.full-width{
    grid-column:1 / -1;
}

label{
    margin-bottom:8px;
    font-weight:600;
    color:#555;
}

input,
select,
textarea{
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:16px;
    outline:none;
    transition:0.3s;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#4f46e5;
    box-shadow:0 0 0 3px rgba(79,70,229,0.15);
}

textarea{
    resize:vertical;
    min-height:120px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#4f46e5;
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#4338ca;
}

/* Mobile Responsive */
@media (max-width: 768px){
    .form-grid{
        grid-template-columns:1fr;
    }

    .form-container{
        padding:20px;
    }
}
</style>
</head>

<body>

<div class="form-container">
    <h2>Contact Form</h2>

    <form>
        <div class="form-grid">

            <div class="form-group">
                <label>First Name</label>
                <input type="text" placeholder="Enter first name">
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input type="text" placeholder="Enter last name">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Enter email">
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="tel" placeholder="Enter phone number">
            </div>

            <div class="form-group full-width">
                <label>Subject</label>
                <select>
                    <option>Select Subject</option>
                    <option>Support</option>
                    <option>Sales</option>
                    <option>Feedback</option>
                </select>
            </div>

            <div class="form-group full-width">
                <label>Message</label>
                <textarea placeholder="Write your message"></textarea>
            </div>

            <div class="form-group full-width">
                <button type="submit">Submit</button>
            </div>

        </div>
    </form>
</div>

</body>
</html>
